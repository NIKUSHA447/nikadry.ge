<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOT - სერია 1</title>
    <style>
        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
        }
        .header { 
            padding: 15px; 
            background: #141414; 
            border-bottom: 2px solid #e50914; 
        }
        .header h3 { margin: 0; font-size: 1.2rem; }
        
        /* კონტეინერი, რომელიც ვიდეოს სწორ პროპორციას აძლევს */
        .video-container { 
            width: 100%; 
            max-width: 900px; 
            margin: 20px auto; 
            position: relative; 
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0; 
            overflow: hidden; 
            border-radius: 8px; 
            background: #000;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.2);
        }
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        .info { padding: 20px; color: #ccc; }
        .back-btn { 
            color: #e50914; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1rem; 
            transition: 0.3s;
        }
        .back-btn:hover { color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h3>Attack on Titan - სერია 1 (ქართულად)</h3>
    </div>

    <div class="video-container">
        <iframe 
            src="https://drive.google.com/file/d/1Dir1V5pFhhIGaNAewWUEwWv2otdbpuxA/preview" 
            allow="autoplay; fullscreen; picture-in-picture" 
            allowfullscreen="true" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true">
        </iframe>
    </div>

    <div class="info">
        <p>💡 სუბტიტრების ჩასართავად დააჭირეთ ვიდეოს ქვედა კუთხეში <b>"CC"</b> ღილაკს.</p>
        <br>
        <a href="aot_main.html" class="back-btn">← სერიების სიაში დაბრუნება</a>
    </div>
</body>
</html>
