<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOT - სერია 1</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
        .header { padding: 15px; background: #141414; border-bottom: 1px solid #333; }
        .video-container { width: 100%; max-width: 900px; margin: 10px auto; background: #000; line-height: 0; }
        video { width: 100%; height: auto; max-height: 80vh; outline: none; background: #000; }
        .info { padding: 20px; color: #ccc; }
        .back-btn { color: #e50914; text-decoration: none; font-weight: bold; font-size: 1.1rem; display: inline-block; margin-top: 10px; }
        
        /* სუბტიტრების სტილი (რომ ტელეფონზე კარგად გამოჩნდეს) */
        video::cue {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>Attack on Titan - სერია 1</h3>
    </div>

    <div class="video-container">
        <video controls playsinline webkit-playsinline crossorigin="anonymous">
            <source src="https://drive.google.com/uc?export=download&id=1Dir1V5pFhhIGaNAewWUEwWv2otdbpuxA" type="video/mp4">
            
            <track src="titan1.vtt" kind="subtitles" srclang="ka" label="ქართული" default>
            
            თქვენს ბრაუზერს არ აქვს მხარდაჭერა.
        </video>
    </div>

    <div class="info">
        <a href="aot_main.html" class="back-btn">← სერიების სია</a>
    </div>

    <script>
        // ავტომატურად ვცდილობთ სუბტიტრების გააქტიურებას
        const video = document.querySelector('video');
        video.addEventListener('loadedmetadata', () => {
            const tracks = video.textTracks;
            if (tracks.length > 0) {
                tracks[0].mode = 'showing';
            }
        });
    </script>
</body>
</html>
