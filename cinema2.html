<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKUSHA TV | NEW MOVIE</title>
    <style>
        /* მთავარი სტილი */
        body { 
            margin: 0; 
            background: #050505; 
            color: white; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ნავიგაცია */
        nav { 
            background: rgba(0,0,0,0.9); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: fixed; 
            width: 90%; 
            top: 0; 
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo { 
            color: #e50914; 
            font-size: 24px; 
            font-weight: bold; 
            text-decoration: none; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-controls {
            display: flex;
            gap: 15px;
        }

        /* კონტეინერი */
        .container { 
            margin-top: 100px;
            padding: 20px; 
            max-width: 1000px; 
            margin-left: auto;
            margin-right: auto;
            flex-grow: 1;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 25px;
            color: #fff;
        }

        .video-wrapper { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(229,9,20,0.3); 
            border: 1px solid #222;
            background: #000;
        }

        .video-wrapper iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 0; 
        }

        /* ღილაკები */
        .btn-download {
            padding: 10px 20px;
            background-color: #e50914;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-download:hover {
            background-color: #ff0f1b;
            transform: scale(1.05);
        }

        .btn-back { 
            display: inline-block; 
            margin-top: 40px; 
            padding: 12px 25px; 
            background: #333; 
            color: white; 
            text-decoration: none; 
            border-radius: 4px; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .btn-back:hover { 
            background: #444; 
            transform: scale(1.05); 
        }

        footer {
            padding: 40px;
            text-align: center;
            color: #555;
            font-size: 14px;
        }

        /* მობილურისთვის */
        @media (max-width: 600px) {
            h1 { font-size: 24px; }
            .logo { font-size: 20px; }
            nav { width: 90%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">NIKUSHA TV</a>
        <div class="nav-controls">
            <a href="https://drive.google.com/uc?export=download&id=1CnG8xzfdpuPVwQ8SWq2JtW9LbGu83yHc" target="_blank" class="btn-download">📥 გადმოწერა</a>
        </div>
    </nav>

    <div class="container">
        <h1>ახალი ფილმი</h1>
        
        <div class="video-wrapper">
            <iframe 
                src="https://drive.google.com/file/d/1CnG8xzfdpuPVwQ8SWq2JtW9LbGu83yHc/preview" 
                allow="autoplay; fullscreen" 
                allowfullscreen="true" 
                webkitallowfullscreen="true" 
                mozallowfullscreen="true">
            </iframe>
        </div>

        <a href="index.html" class="btn-back">⬅ უკან დაბრუნება</a>
    </div>

    <footer>
        © 2026 NIKUSHA PREMIUM ENTERTAINMENT
    </footer>

</body>
</html>
