<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKUSHA TV | PREMIUM</title>
    <style>
        /* მთავარი სტილი */
        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ნავიგაცია */
        nav {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            color: #e50914;
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
        }

        /* კონტეინერი */
        .main-content {
            margin-top: 100px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-wrapper {
            width: 100%;
            max-width: 1000px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.2);
            border: 1px solid #222;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ინფორმაცია ფილმზე */
        .movie-info {
            max-width: 1000px;
            width: 100%;
            margin-top: 25px;
            text-align: left;
        }

        .movie-title {
            font-size: 32px;
            margin-bottom: 10px;
            color: #fff;
        }

        .tag {
            background: #333;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 14px;
            margin-right: 10px;
            color: #aaa;
        }

        .description {
            color: #999;
            line-height: 1.6;
            margin-top: 20px;
            max-width: 700px;
        }

        /* ღილაკები */
        .btn-back {
            margin-top: 40px;
            padding: 12px 25px;
            background-color: #e50914;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-back:hover {
            background-color: #b20710;
            transform: scale(1.05);
        }

        footer {
            padding: 40px;
            text-align: center;
            color: #555;
            font-size: 14px;
        }

        /* მობილურისთვის მორგება */
        @media (max-width: 600px) {
            .movie-title { font-size: 24px; }
            .logo { font-size: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">NIKUSHA TV</a>
    </nav>

    <div class="main-content">
        <div class="video-wrapper">
            <div class="video-container">
                <iframe src="https://drive.google.com/file/d/1TQ65ootg4VCnQLNZ3aSgPyatr8XQJgku/preview" allow="autoplay"></iframe>
            </div>
        </div>

        <div class="movie-info">
            <h1 class="movie-title">დათარსულები - სეზონი 5</h1>
            <div>
                <span class="tag">HD</span>
                <span class="tag">2026</span>
                <span class="tag">კომედია</span>
            </div>
            <p class="description">
                უყურეთ "დათარსულების" ახალ ეპიზოდებს ექსკლუზიურად ნიკუშას პლატფორმაზე. 
                უმაღლესი ხარისხი და საუკეთესო გახმოვანება მხოლოდ ჩვენთან.
            </p>
        </div>

        <a href="index.html" class="btn-back">⬅ მთავარ გვერდზე</a>
    </div>

    <footer>
        © 2026 NIKUSHA PREMIUM ENTERTAINMENT
    </footer>

</body>
</html>
