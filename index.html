<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKADRY TV | მენიუ</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: Arial, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center; 
        }
        .container { 
            border: 2px solid #e50914; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.4); 
            max-width: 500px; 
            width: 90%; 
        }
        h1 { 
            font-size: 45px; 
            color: #e50914; 
            margin-bottom: 30px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
        p { color: #ccc; margin-bottom: 25px; font-size: 18px; }
        .movie-list { display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            display: block; 
            padding: 15px; 
            background: #1a1a1a; 
            color: white; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 8px; 
            border: 1px solid #333;
            transition: 0.3s;
        }
        .btn:hover { 
            background: #e50914; 
            transform: scale(1.05); 
            border-color: white; 
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.8);
        }
        .footer { margin-top: 30px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h1>NIKADRY TV</h1>
        <p>აირჩიე რისი ყურება გინდა:</p>
        
        <div class="movie-list">
            <a href="cinema.html" class="btn">🎬 დათარსულები (S5 E4)</a>
            
            <a href="cinema2.html" class="btn">🎬 ახალი ფილმი (NEW)</a>
        </div>

        <div class="footer">© 2026 NIKUSHA PREMIUM ENTERTAINMENT</div>
    </div>

</body>
</html>
